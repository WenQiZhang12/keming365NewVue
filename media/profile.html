<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - 科明365VR教学云平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f5f6fa;color:#333}
a{text-decoration:none;color:inherit}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer}
.header .logo span{color:#64b5f6}
.header .nav{display:flex;gap:24px;font-size:14px}
.header .nav a{padding:6px 0;border-bottom:2px solid transparent}
.header .nav a:hover,.header .nav a.active{border-bottom-color:#64b5f6;color:#64b5f6}
.header .user{font-size:14px;display:flex;align-items:center;gap:12px}
.header .user .name{color:#64b5f6}
.header .user .btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer}
.header .user .btn-login{background:#64b5f6;color:#fff;border:none}
.header .user .btn-login:hover{background:#42a5f5}
.header .user .btn-reg{border:1px solid rgba(255,255,255,.6);color:#fff;background:transparent}
.header .user .btn-reg:hover{border-color:#fff}
.header .user .btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:4px 12px;border-radius:14px;cursor:pointer;font-size:12px}
.header .user .btn-logout:hover{border-color:#ff5252;color:#ff5252}

/* 用户头像下拉菜单 */
.user-dropdown{position:relative;display:inline-block}
.avatar{width:36px;height:36px;border-radius:50%;background:#64b5f6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;user-select:none}
.avatar:hover{background:#42a5f5;transform:scale(1.05)}
.dropdown-menu{position:absolute;top:48px;right:0;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);min-width:160px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .2s;z-index:200}
.dropdown-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown-item{padding:10px 16px;font-size:13px;color:#333;cursor:pointer;white-space:nowrap;transition:.15s}
.dropdown-item:hover{background:#f5f6fa;color:#1a237e}
.dropdown-item.danger{color:#e53935}
.dropdown-item.danger:hover{background:#ffebee}
.dropdown-divider{height:1px;background:#e8e8e8;margin:4px 0}

.container{max-width:1000px;margin:0 auto;padding:20px}
.breadcrumb{font-size:13px;color:#999;margin-bottom:16px}
.breadcrumb a{color:#1a237e}

.profile-card{background:linear-gradient(135deg,#1a237e,#3949ab);border-radius:16px;padding:30px;color:#fff;display:flex;align-items:center;gap:24px;margin-bottom:24px}
.profile-card .avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.profile-card .info{flex:1}
.profile-card .info h2{font-size:22px;margin-bottom:4px}
.profile-card .info p{font-size:13px;opacity:.8}
.profile-card .badge{padding:6px 16px;border-radius:20px;font-size:12px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2)}

.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{text-align:center;padding:16px;background:#fafbff;border-radius:10px;border:1px solid #eef0f4}
.stat-card .num{font-size:24px;font-weight:700;color:#1a237e}
.stat-card .label{font-size:12px;color:#999;margin-top:4px}

.tabs{display:flex;background:#fff;border-radius:12px 12px 0 0;overflow:hidden}
.tabs .tab{flex:1;padding:14px;text-align:center;font-size:14px;cursor:pointer;border-bottom:3px solid transparent;color:#666}
.tabs .tab:hover{color:#1a237e}
.tabs .tab.active{color:#1a237e;border-bottom-color:#1a237e;font-weight:600}

.tab-content{background:#fff;border-radius:0 0 12px 12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px;min-height:300px}

.plan-card{display:flex;align-items:center;gap:16px;padding:16px;border:1px solid #eef0f4;border-radius:10px;margin-bottom:10px;cursor:pointer}
.plan-card:hover{border-color:#c5cae9;background:#fafbff}
.plan-card .plan-icon{width:48px;height:48px;border-radius:10px;background:linear-gradient(135deg,#e8eaf6,#c5cae9);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.plan-card .plan-info{flex:1}
.plan-card .plan-info h4{font-size:14px;font-weight:600;margin-bottom:4px}
.plan-card .plan-info p{font-size:12px;color:#999}
.plan-card .plan-status{padding:4px 12px;border-radius:12px;font-size:12px}
.plan-card .plan-status.ing{background:#e3f2fd;color:#1565c0}
.plan-card .plan-status.done{background:#e8f5e9;color:#2e7d32}

.score-card{display:flex;align-items:center;gap:16px;padding:14px 16px;border:1px solid #eef0f4;border-radius:10px;margin-bottom:8px}
.score-card:hover{border-color:#c5cae9}
.score-card .score-icon{width:40px;height:40px;border-radius:8px;background:linear-gradient(135deg,#fff3e0,#ffe0b2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.score-card .score-info{flex:1}
.score-card .score-info h4{font-size:14px;font-weight:600;margin-bottom:2px}
.score-card .score-info p{font-size:12px;color:#999}
.score-card .score-num{font-size:20px;font-weight:700;color:#1a237e}

.order-card{border:1px solid #eef0f4;border-radius:10px;padding:16px;margin-bottom:10px}
.order-card .order-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.order-card .order-header .order-id{font-size:12px;color:#999}
.order-card .order-header .order-status{padding:3px 10px;border-radius:10px;font-size:11px}
.order-card .order-header .order-status.paid{background:#e8f5e9;color:#2e7d32}
.order-card .order-header .order-status.pending{background:#fff3e0;color:#e65100}
.order-card .order-header .order-status.cancel{background:#f5f5f5;color:#999}
.order-card .order-body{font-size:13px;color:#555;line-height:1.8}
.order-card .order-body .price{font-size:18px;font-weight:700;color:#e53935;margin-top:4px}

.empty{text-align:center;padding:60px 20px;color:#999}
.empty .icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:60px;color:#999}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#1a237e;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.toast.error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.toast.info{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}

.footer{background:#1a237e;color:rgba(255,255,255,.7);text-align:center;padding:32px 20px;font-size:13px;margin-top:40px}

@media(max-width:768px){
.profile-card{flex-direction:column;text-align:center}
.stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="location.href='index.html'">📘<span>科明365</span>VR教学云平台</div>
  <div class="nav">
    <a href="index.html">首页</a>
    <a href="courses.html">全部课程</a>
    <a href="news.html">新闻资讯</a>
    <a href="about.html">关于我们</a>
    <a href="profile.html" class="active">个人中心</a>
  </div>
  <div class="user" id="headerUser">
    <a href="javascript:;" class="btn btn-login" onclick="showLogin()">登录</a>
    <a href="javascript:;" class="btn btn-reg" onclick="showLogin()">注册</a>
  </div>
</div>

<div class="container">
  <div class="breadcrumb"><a href="index.html">首页</a> &gt; 个人中心</div>

  <!-- 未登录提示 -->
  <div id="loginPrompt" style="display:none"><div class="empty" style="padding:80px">
    <div class="icon">🔐</div>
    <h2 style="margin-bottom:12px;font-size:20px">请先登录</h2>
    <p style="margin-bottom:20px">登录后查看学习计划、成绩和订单</p>
    <button onclick="showLogin()" style="padding:12px 32px;background:#1a237e;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer">去登录</button>
  </div></div>

  <!-- 已登录内容 -->
  <div id="profileContent" style="display:none">
    <div class="profile-card" id="profileCard">
      <div class="avatar">👤</div>
      <div class="info">
        <h2 id="userName">用户</h2>
        <p id="userMeta">手机：- | 类型：-</p>
      </div>
      <span class="badge" id="userTypeBadge" style="cursor:pointer" onclick="editProfile()">编辑资料 ✏️</span><span class="badge" id="userTypeBadge2" style="cursor:pointer" onclick="changePassword()">修改密码 🔑</span>
    </div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('plans')">🔬 我的实验</div>
      <div class="tab" onclick="switchTab('scores')">📊 学习成果</div>
      <div class="tab" onclick="switchTab('orders')">📦 我的订单</div>
    </div>
    <div class="tab-content" id="tabContent"></div>
  </div>

</div>

<div class="footer">
  <p>© 2026 科明365VR教学云平台 版权所有</p>
  <p>技术支持：科明教育科技</p>
</div>

<script>
// ============ 工具函数 ============
const API = '/api/v1';

function $(id) { return document.getElementById(id); }

function toast(msg, t) {
  var el = document.createElement('div');
  el.className = 'toast ' + (t || 'info');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 2500);
}

async function api(method, path, body) {
  var opts = { method: method, headers: { 'Content-Type': 'application/json' } };
  var token = localStorage.getItem('token');
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  var r = await fetch(API + '/' + path.replace(/^\//,''), opts);
  if (r.status === 204) return {};
  var data = await r.json();
  if (!r.ok) throw new Error(data.message || data.detail || '请求失败');
  return data;
}

// ============ 登录弹窗 ============
var loginOverlay = null;
function showLogin() {
  if (!loginOverlay) {
    loginOverlay = document.createElement('div');
    loginOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center';
    // loginOverlay.onclick = function(e) { if (e.target === this) this.style.display = 'none'; };
    loginOverlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:32px;width:380px;position:relative">'
      + '<span style="position:absolute;right:16px;top:12px;cursor:pointer;font-size:20px" onclick="closeLogin()">✕</span>'
      + '<h2 style="margin-bottom:20px">🔐 登录</h2>'
      + '<div style="margin-bottom:14px"><input id="loginUser" placeholder="用户名" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
      + '<div style="margin-bottom:14px"><input id="loginPass" type="password" placeholder="密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
      + '<button onclick="doLogin()" style="width:100%;padding:10px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer">登录</button>'
      + '<p id="loginErr" style="color:#e53935;font-size:13px;margin-top:8px;text-align:center"></p></div>';
    document.body.appendChild(loginOverlay);
  }
  loginOverlay.style.display = 'flex';
  setTimeout(function(){ var u = $('loginUser'); if (u) u.focus(); }, 100);
}
function closeLogin() { if (loginOverlay) loginOverlay.style.display = 'none'; }

async function doLogin() {
  var u = $('loginUser'); var p = $('loginPass');
  if (!u || !p || !u.value || !p.value) { $('loginErr').textContent = '请填写用户名和密码'; return; }
  try {
    var d = await api('POST', 'accounts/auth/login/', { username: u.value, password: p.value });
    localStorage.setItem('token', d.access);
    localStorage.setItem('user', JSON.stringify(d.user));
    closeLogin();
    toast('登录成功', 'success');
    location.reload();
  } catch(e) { $('loginErr').textContent = e.message; }
}

// ============ 退出 ============
function toggleMenu(){var m=document.getElementById('userMenu');if(m)m.classList.toggle('show');}
document.addEventListener('click',function(e){var m=document.getElementById('userMenu');if(m&&!e.target.closest('.user-dropdown'))m.classList.remove('show');});
function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  location.href = 'index.html';
}

// ============ 头部用户状态 ============
function updateHeaderUI() {
  var saved = localStorage.getItem('user');
  if (saved) {
    try {
      var user = JSON.parse(saved);
      var name=user.name||user.username||'用户';var initial=name.charAt(0).toUpperCase();
      $('headerUser').innerHTML='<div class="user-dropdown"><div class="avatar" onclick="toggleMenu()">'+initial+'</div><div class="dropdown-menu" id="userMenu"><div class="dropdown-item" onclick="location.href=\'profile.html\'">👤 个人中心</div><div class="dropdown-item" onclick="window.open(\'http://58.56.66.164:7777/manage/\',\'_blank\')">⚙️ 管理后台</div><div class="dropdown-divider"></div><div class="dropdown-item danger" onclick="logout()">🚪 退出登录</div></div></div>';
      var t=user.type;
      setTimeout(function(){var items=document.querySelectorAll('.dropdown-item');if(items.length>1)items[1].style.display=(t===2)?'block':'none';},0);
      return;
    } catch(e) {}
  }
  $('headerUser').innerHTML = '<a href="javascript:;" class="btn btn-login" onclick="showLogin()">登录</a><a href="javascript:;" class="btn btn-reg" onclick="showLogin()">注册</a>';
}

// ============ 初始化 ============
var userData = null;
var activeTab = 'plans';

function getToken() {
  try { var s = JSON.parse(localStorage.getItem('admin_state')||'{}'); return s.token || localStorage.getItem('token') || ''; } catch(e) { return ''; }
}

async function init() {
  updateHeaderUI();var me=document.getElementById('userMenu');if(me)me.classList.remove('show');

  var token = getToken();
  if (!token) {
    $('loginPrompt').style.display = 'block';
    return;
  }

  try {
    userData = await api('GET', 'accounts/auth/profile/');
    if (!userData || !userData.username) throw new Error('获取用户信息失败');
  } catch(e) {
    console.error('Profile error:', e);
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    $('loginPrompt').style.display = 'block';
    return;
  }

  // 显示已登录内容
  $('loginPrompt').style.display = 'none';
  $('profileContent').style.display = 'block';

  // 个人信息
  $('userName').textContent = userData.name || userData.username || '用户';
  var typeMap = {0:'学生',1:'教师',2:'管理员'};
  $('userMeta').textContent = '手机：' + (userData.telephone || '-') + ' | 类型：' + (typeMap[userData.type] || '未知');
  $('userTypeBadge').textContent = typeMap[userData.type] || '未知';
  $('userTypeBadge2').textContent = '修改密码 🔑';

  // 加载默认tab
  loadTab('plans');
}

function switchTab(tab) {
  activeTab = tab;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  var el = document.querySelector('.tab[onclick*="' + tab + '"]');
  if (el) el.classList.add('active');
  loadTab(tab);
}

async function loadTab(tab) {
  var content = $('tabContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div>加载中...</div>';

  if (tab === 'plans') await loadPlans(content);
  else if (tab === 'scores') await loadScores(content);
  else if (tab === 'orders') await loadOrders(content);
}

// ============ 我的实验 ============
async function loadPlans(el) {
  try {
    var d = await api('GET', 'scores/my-experiments/');
    var list = d.results || [];

    $('statsGrid').innerHTML = ''
      + '<div class="stat-card"><div class="num">' + list.length + '</div><div class="label">我的实验</div></div>'
      + '<div class="stat-card"><div class="num">' + list.length + '</div><div class="label">已练习</div></div>'
      + '<div class="stat-card"><div class="num">0</div><div class="label">已完成</div></div>';

    if (list.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">🔬</div><p>暂无实验记录</p><p style="font-size:13px;color:#bbb;margin-top:8px">去课程页面点击「开始实验」即可加入</p></div>';
      return;
    }

    var html = '';
    for (var i = 0; i < list.length; i++) {
      var p = list[i];
      html += '<div class="plan-card" onclick="location.href=\'experiment.html?id=' + p.id + '\'">'
        + '<div class="plan-icon">🔬</div>'
        + '<div class="plan-info"><h4>' + (p.title || '实验') + '</h4>'
        + '<p>' + (p.firstPracticeTime ? '首次练习：' + p.firstPracticeTime.slice(0,10) : '') + '</p></div>'
        + '<span class="plan-status ing">已练习 ' + p.practiceCount + ' 次</span>'
        + '</div>';
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="icon">😵</div><p>加载失败：' + e.message + '</p></div>';
  }
}

// ============ 学习成果 ============
async function loadScores(el) {
  try {
    var sc = await api('GET', 'scores/my/');
    var ts = await api('GET', 'scores/time-stats/');
    var list = sc.results || [];

    var avg = 0;
    if (list.length > 0) {
      var sum = 0;
      for (var i = 0; i < list.length; i++) sum += parseFloat(list[i].reportScore || 0);
      avg = Math.round(sum / list.length);
    }

    $('statsGrid').innerHTML = ''
      + '<div class="stat-card"><div class="num">' + (ts.totalExperiments || list.length) + '</div><div class="label">实验次数</div></div>'
      + '<div class="stat-card"><div class="num">' + avg + '</div><div class="label">平均分</div></div>'
      + '<div class="stat-card"><div class="num">' + Math.round((ts.totalTime||0)/60) + '</div><div class="label">学习时长(分)</div></div>';

    if (list.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">📊</div><p>暂无学习记录</p></div>';
      return;
    }

    var html = '';
    for (var i = 0; i < list.length; i++) {
      var s = list[i];
      html += '<div class="score-card">'
        + '<div class="score-icon">🔬</div>'
        + '<div class="score-info"><h4>' + (s.experimentName || '实验') + '</h4>'
        + '<p>' + (s.createTime ? s.createTime.slice(0,10) : '') + '</p></div>'
        + '<div class="score-num">' + (s.reportScore || '-') + '</div>'
        + '</div>';
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="icon">😵</div><p>加载失败：' + e.message + '</p></div>';
  }
}

// ============ 我的订单 ============
async function loadOrders(el) {
  try {
    var d = await api('GET', 'payments/orders/');
    var list = d.results || [];

    var paid = 0, pending = 0;
    for (var i = 0; i < list.length; i++) {
      if (list[i].status === 1) paid++;
      else if (list[i].status === 0) pending++;
    }

    $('statsGrid').innerHTML = ''
      + '<div class="stat-card"><div class="num">' + list.length + '</div><div class="label">总订单</div></div>'
      + '<div class="stat-card"><div class="num">' + paid + '</div><div class="label">已支付</div></div>'
      + '<div class="stat-card"><div class="num">' + pending + '</div><div class="label">待支付</div></div>';

    if (list.length === 0) {
      el.innerHTML = '<div class="empty"><div class="icon">📦</div><p>暂无订单</p></div>';
      return;
    }

    var statusLabel = {'0':'⏳ 待支付','1':'✅ 已支付','-1':'❌ 已取消'};
    var statusClass = {'0':'pending','1':'paid','-1':'cancel'};
    var html = '';
    for (var i = 0; i < list.length; i++) {
      var o = list[i];
      var st = o.status !== undefined && o.status !== null ? String(o.status) : '0';
      html += '<div class="order-card">'
        + '<div class="order-header">'
        + '<span class="order-id">订单号：' + (o.id || '-') + '</span>'
        + '<span class="order-status ' + (statusClass[st]||'pending') + '">' + (statusLabel[st]||'未知') + '</span>'
        + '</div>'
        + '<div class="order-body">'
        + '<div>📅 ' + (o.createTime ? o.createTime.slice(0,10) : '-') + '</div>'
        + '<div class="price">¥' + parseFloat(o.totalPrice || o.amount || 0).toFixed(2) + '</div>'
        + '</div></div>';
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="empty"><div class="icon">😵</div><p>加载失败：' + e.message + '</p></div>';
  }
}

// ============ 编辑资料 ============
function editProfile() {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center';
  overlay.onclick = function(e) { if (e.target === this) this.remove(); };
  overlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:32px;width:400px;position:relative">'
    + '<span style="position:absolute;right:16px;top:12px;cursor:pointer;font-size:20px" onclick="this.parentElement.parentElement.remove()">✕</span>'
    + '<h2 style="margin-bottom:20px">✏️ 编辑资料</h2>'
    + '<div style="margin-bottom:14px"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">姓名</label><input id="editName" value="' + (userData.name||'') + '" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
    + '<div style="margin-bottom:14px"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px">手机号</label><input id="editPhone" value="' + (userData.telephone||'') + '" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
    + '<button onclick="saveProfile()" style="width:100%;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer">保存</button>'
    + '<p id="editErr" style="color:#e53935;font-size:13px;margin-top:8px;text-align:center"></p></div>';
  document.body.appendChild(overlay);
}

async function saveProfile() {
  var name = document.getElementById('editName').value;
  var phone = document.getElementById('editPhone').value;
  try {
    await api('PUT', 'accounts/auth/profile/', { name: name, telephone: phone });
    toast('保存成功', 'success');
    // 刷新数据
    userData = await api('GET', 'accounts/auth/profile/');
    $('userName').textContent = userData.name || userData.username || '用户';
    $('userMeta').textContent = '手机：' + (userData.telephone || '-') + ' | 类型：' + ({0:'学生',1:'教师',2:'管理员'}[userData.type] || '未知');
    // 更新 localStorage
    localStorage.setItem('user', JSON.stringify(userData));
    // 关闭弹窗
    document.querySelector('div[style*="z-index:999"]')?.remove();
  } catch(e) {
    document.getElementById('editErr').textContent = e.message;
  }
}

// ============ 修改密码 ============
function changePassword() {
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center';
  overlay.onclick = function(e) { if (e.target === this) this.remove(); };
  overlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:32px;width:400px;position:relative">'
    + '<span style="position:absolute;right:16px;top:12px;cursor:pointer;font-size:20px" onclick="this.parentElement.parentElement.remove()">✕</span>'
    + '<h2 style="margin-bottom:20px">🔑 修改密码</h2>'
    + '<div style="margin-bottom:14px"><input id="oldPass" type="password" placeholder="原密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
    + '<div style="margin-bottom:14px"><input id="newPass" type="password" placeholder="新密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
    + '<div style="margin-bottom:14px"><input id="confirmPass" type="password" placeholder="确认新密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>'
    + '<button onclick="doChangePassword()" style="width:100%;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer">确认修改</button>'
    + '<p id="pwdErr" style="color:#e53935;font-size:13px;margin-top:8px;text-align:center"></p></div>';
  document.body.appendChild(overlay);
}

async function doChangePassword() {
  var oldP = document.getElementById('oldPass').value;
  var newP = document.getElementById('newPass').value;
  var confirmP = document.getElementById('confirmPass').value;
  if (!newP || newP.length < 6) { document.getElementById('pwdErr').textContent = '新密码至少6位'; return; }
  if (newP !== confirmP) { document.getElementById('pwdErr').textContent = '两次密码不一致'; return; }
  try {
    await api('POST', 'accounts/auth/change-password/', { oldPassword: oldP, newPassword: newP });
    toast('密码修改成功，请重新登录', 'success');
    setTimeout(function() { logout(); }, 1500);
  } catch(e) {
    document.getElementById('pwdErr').textContent = e.message;
  }
}

// ============ 启动 ============
init();
</script>
