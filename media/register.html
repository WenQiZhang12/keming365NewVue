<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科明365 - 用户注册</title>
<link rel="shortcut icon" href="https://www.keming365.com/upload/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:linear-gradient(135deg,#1a237e,#283593);min-height:100vh;display:flex;align-items:center;justify-content:center}
.register-box{background:#fff;border-radius:16px;padding:40px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;font-size:22px;font-weight:700;color:#1a237e;margin-bottom:24px}
.logo span{color:#666;font-size:13px;font-weight:400;display:block;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{font-size:13px;color:#666;display:block;margin-bottom:4px;font-weight:600}
.form-group input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:.2s}
.form-group input:focus{border-color:#1a237e;box-shadow:0 0 0 3px rgba(26,35,126,.1)}
.form-group input.error{border-color:#e53935}
.error-msg{color:#e53935;font-size:12px;margin-top:4px;display:none}
.btn{width:100%;padding:12px;background:#1a237e;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;transition:.2s;font-weight:600}
.btn:hover{background:#283593}
.btn:disabled{background:#999;cursor:not-allowed}
.tips{text-align:center;margin-top:16px;font-size:13px;color:#999}
.tips a{color:#1a237e;text-decoration:none;font-weight:600}
.tips a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="register-box">
  <div class="logo">🎓 科明365 <span>VR教学云平台 · 用户注册</span></div>
  <form id="registerForm" onsubmit="return false">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="regUsername" placeholder="请输入用户名" maxlength="20">
      <div class="error-msg" id="errUsername"></div>
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="regName" placeholder="请输入真实姓名" maxlength="20">
      <div class="error-msg" id="errName"></div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" maxlength="32">
      <div class="error-msg" id="errPassword"></div>
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="regPassword2" placeholder="请再次输入密码" maxlength="32">
      <div class="error-msg" id="errPassword2"></div>
    </div>
    <div class="form-group">
      <label>手机号（选填）</label>
      <input type="text" id="regPhone" placeholder="请输入手机号" maxlength="11">
    </div>
    <button class="btn" id="regBtn" onclick="doRegister()">注册</button>
  </form>
  <div class="tips">已有账号？<a href="index.html">立即登录</a></div>
  <div id="regMsg" style="text-align:center;margin-top:12px;font-size:13px;color:#e53935"></div>
</div>
<script>
const API = '/api/v1';
function $(id) { return document.getElementById(id); }

async function doRegister() {
  var username = $('regUsername').value.trim();
  var name = $('regName').value.trim();
  var password = $('regPassword').value;
  var password2 = $('regPassword2').value;
  var phone = $('regPhone').value.trim();

  // 验证
  var ok = true;
  document.querySelectorAll('.error-msg').forEach(function(e) { e.style.display = 'none'; });
  document.querySelectorAll('.form-group input').forEach(function(e) { e.classList.remove('error'); });

  if (!username) { $('errUsername').textContent = '请输入用户名'; $('errUsername').style.display = 'block'; ok = false; }
  if (!name) { $('errName').textContent = '请输入姓名'; $('errName').style.display = 'block'; ok = false; }
  if (!password || password.length < 6) { $('errPassword').textContent = '密码至少6位'; $('errPassword').style.display = 'block'; ok = false; }
  if (password !== password2) { $('errPassword2').textContent = '两次密码不一致'; $('errPassword2').style.display = 'block'; ok = false; }
  if (phone && !/^1\d{10}$/.test(phone)) { $('errMsg').textContent = '手机号格式不正确'; ok = false; }
  if (!ok) return;

  $('regBtn').disabled = true;
  $('regBtn').textContent = '注册中...';
  $('regMsg').textContent = '';

  try {
    var r = await fetch(API + '/accounts/auth/register/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, name: name, password: password, telephone: phone || undefined })
    });
    var d = await r.json();
    if (r.ok) {
      $('regMsg').style.color = '#2e7d32';
      $('regMsg').textContent = '注册成功！即将跳转登录...';
      setTimeout(function() { location.href = 'index.html'; }, 1500);
    } else {
      $('regMsg').textContent = d.message || d.detail || '注册失败';
    }
  } catch(e) {
    $('regMsg').textContent = '网络错误';
  }
  $('regBtn').disabled = false;
  $('regBtn').textContent = '注册';
}
</script>
</body>
</html>
