<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科明365 - 我的实验报告</title>
<link rel="shortcut icon" href="https://www.keming365.com/upload/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f5f6fa;color:#333}
a{text-decoration:none;color:inherit}

/* Header */
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 40px;height:64px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer;width:200px;flex-shrink:0}
.header .logo span{color:#64b5f6}
.header .nav{display:grid;grid-template-columns:repeat(7,1fr);width:700px;font-size:14px;text-align:center;position:absolute;left:50%;transform:translateX(-50%)}
.header .nav a{padding:6px 0;border-bottom:2px solid transparent;transition:.2s}
.header .nav a:hover,.header .nav a.active{border-bottom-color:#64b5f6;color:#64b5f6}
.header .user{font-size:14px;display:flex;align-items:center;gap:12px;margin-left:auto}
.header .user .btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer}
.header .user .btn-login{background:#64b5f6;color:#fff;border:none}
.header .user .btn-login:hover{background:#42a5f5}
.header .user .btn-reg{border:1px solid rgba(255,255,255,.6);color:#fff;background:transparent}
.header .user .btn-reg:hover{border-color:#fff}
.container{max-width:1000px;margin:24px auto;padding:0 20px}
.breadcrumb{font-size:13px;color:#999;margin-bottom:16px}
.breadcrumb a{color:#1a237e;text-decoration:none}
.page-title{font-size:18px;font-weight:700;color:#1a237e;margin-bottom:20px}
.table-wrap{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);overflow:hidden;min-height:300px}
table{width:100%;border-collapse:collapse}
thead{background:#f8f9ff}
th{padding:14px 12px;text-align:left;font-size:13px;color:#666;font-weight:600;border-bottom:2px solid #eef0f7}
td{padding:12px;font-size:13px;color:#333;border-bottom:1px solid #f0f0f0}
tr:hover{background:#fafbff}
a{color:#1a237e;text-decoration:none}
a:hover{text-decoration:underline}
.status-tag{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px}
.status-tag.uploaded{background:#e3f2fd;color:#1565c0}
.status-tag.pending{background:#fff3e0;color:#e65100}
.pagination{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;font-size:13px;color:#666}
.pagination .page-btns{display:flex;gap:4px}
.pagination .page-btns button{padding:6px 12px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;font-size:12px}
.pagination .page-btns button:hover{background:#f0f0f0}
.pagination .page-btns button.active{background:#1a237e;color:#fff;border-color:#1a237e}
.empty{text-align:center;padding:60px 20px;color:#999;font-size:14px}
.empty .icon{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div id="app">
  <div class="header">
  <div class="logo" onclick="location.href='index.html'">📘<span>科明365</span>VR教学云平台</div>
  <div class="nav">
    <a href="index.html">首页</a>
    <a href="courses.html">全部课程</a>
    <a href="news.html">新闻资讯</a>
    <a href="platform.html">平台简介</a>
    <a href="video.html">职教出海</a>
    <a href="about.html">关于我们</a>
    <a href="profile.html">个人中心</a>
  </div>
  <div class="user" id="headerUser">
    <a href="login.html" class="btn btn-login">登录</a>
    <a href="register.html" class="btn btn-reg">注册</a>
  </div>
</div>
<div class="container">
  <div class="breadcrumb"><a href="index.html">首页</a> &gt; <a href="profile.html">个人中心</a> &gt; <span>我的实验报告</span></div>
  <div class="page-title">📄 我的实验报告</div>
  <div class="table-wrap" id="tableWrap">
    <div class="empty" id="defaultHint"><div class="icon">📄</div><p>暂无实验报告</p></div>
    <table id="reportTable" style="display:none">
      <thead><tr><th>学号</th><th>班级</th><th>课程</th><th>实验</th><th>成绩</th><th>报告状态</th><th>操作</th></tr></thead>
      <tbody id="reportBody"></tbody>
    </table>
    <div id="pagination" style="display:none"></div>
  </div>
</div>
<script>
const API = '/api/v1';
let currentPage = 1;

function getToken() {
  var t = localStorage.getItem('token');
  if (t) return t;
  try { var s = JSON.parse(localStorage.getItem('admin_state')||'{}'); return s.token || ''; } catch(e) { return ''; }
}

async function api(method, path) {
  var opts = { method, headers: { 'Content-Type': 'application/json' } };
  var token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  var r = await fetch(API + '/' + path.replace(/^\//,''), opts);
  if (r.status === 401) { var hadUser = !!localStorage.getItem('user'); localStorage.removeItem('token'); localStorage.removeItem('user'); alert(hadUser ? '登录已过期，请重新登录' : '请先登录'); location.href = 'index.html'; return null; }
  try { return await r.json(); } catch(e) { return {}; }
}

function getUserId() {
  try { var s = JSON.parse(localStorage.getItem('admin_state')||'{}'); if (s.user && s.user.id) return s.user.id; } catch(e) {}
  var token = getToken();
  if (token) { try { var p = JSON.parse(atob(token.split('.')[1])); if (p.user_id) return p.user_id; } catch(e) {} }
  return null;
}

async function load(page) {
  if (page !== undefined) currentPage = page;
  var uid = getUserId();
  if (!uid) { document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="icon">🔒</div><p>请先登录</p></div>'; return; }
  document.getElementById('tableWrap').innerHTML = '<div class="empty"><div class="icon">⏳</div><p>加载中...</p></div>';
  var d = await api('GET', 'scores/student/reports/?userId='+uid+'&startPage='+currentPage+'&PageSize=10');
  if (!d) return;
  var rows = d.list && d.list.rows || [];
  if (rows.length === 0) {
    document.getElementById('tableWrap').innerHTML = '<div class="empty" style="display:block"><div class="icon">📄</div><p>暂无实验报告</p></div>';
    return;
  }
  var html = '<div class="table-scroll"><table><thead><tr><th>学号</th><th>班级</th><th>课程</th><th>实验</th><th>成绩</th><th>报告状态</th><th>操作</th></tr></thead><tbody>';
  rows.forEach(function(item) {
    var sc = item.flag == 1 ? 'uploaded' : 'pending';
    var st = item.flag == 1 ? '已上传' : '未上传';
    var vl = item.flag == 1 ? '<a href="'+item.pdfPath+'" target="_blank">查看</a>' : '—';
    html += '<tr><td>'+(item.idCard||'')+'</td><td>'+item.classStr+'</td><td>'+item.curriculumStr+'</td><td>'+item.experimentStr+'</td><td>'+(item.scoreSum||'未评分')+'</td><td><span class="status-tag '+sc+'">'+st+'</span></td><td>'+vl+'</td></tr>';
  });
  html += '</tbody></table></div>';
  var pi = d.list.pageInfo;
  if (pi && pi.pages > 1) {
    html += '<div class="pagination"><span>第 '+pi.pageNum+'/'+pi.pages+' 页，共 '+pi.total+' 条</span><div class="page-btns">';
    html += '<button onclick="load(1)">首页</button>';
    if (pi.pageNum > 1) html += '<button onclick="load('+pi.prePage+')">«</button>';
    (pi.navigatepageNums||[]).forEach(function(p) { html += '<button class="'+(p===pi.pageNum?'active':'')+'" onclick="load('+p+')">'+p+'</button>'; });
    if (pi.pageNum < pi.pages) html += '<button onclick="load('+pi.nextPage+')">»</button>';
    html += '<button onclick="load('+pi.pages+')">尾页</button></div></div>';
  }
  document.getElementById('tableWrap').innerHTML = html;
}
load();
</script>
</body>
</html>
