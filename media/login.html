<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科明365VR教学云平台 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:linear-gradient(135deg,#1a237e,#3949ab);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);width:100%;max-width:420px;padding:40px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:28px;color:#1a237e;margin-bottom:8px}
.logo p{color:#666;font-size:14px}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;color:#333;font-size:14px}
.form-group input{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:#1a237e}
.form-group input::placeholder{color:#999}
.login-btn{width:100%;padding:14px;background:#1a237e;color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;transition:background .2s}
.login-btn:hover{background:#283593}
.login-btn:active{transform:scale(.98)}
.error-msg{color:#e53935;font-size:13px;text-align:center;margin-top:12px;min-height:20px}
.link-row{display:flex;justify-content:space-between;margin-top:16px;font-size:13px}
.link-row a{color:#1a237e;text-decoration:none}
.link-row a:hover{text-decoration:underline}
.switch-mode{text-align:center;margin-top:24px;padding-top:24px;border-top:1px solid #eee}
.switch-mode a{color:#1a237e;font-weight:500}
</style>
</head>
<body>
<div class="container">
  <div class="logo">
    <h1>🔐 科明365VR教学云平台</h1>
    <p>专业的虚拟仿真教学平台</p>
  </div>
  
  <div class="form-group">
    <input type="text" id="username" placeholder="用户名" onkeydown="if(event.key==='Enter')$('password').focus()">
  </div>
  
  <div class="form-group">
    <input type="password" id="password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  
  <button class="login-btn" id="loginBtn" onclick="doLogin()">登录</button>
  
  <p class="error-msg" id="errorMsg"></p>
  
  <div class="link-row">
    <a href="#" onclick="showForgotPassword()">忘记密码？</a>
    <a href="register.html">注册账号</a>
  </div>
  
  <div class="switch-mode">
    <a href="index.html">← 返回首页</a>
  </div>
</div>

<script>
const API = '/api/v1';

function $(id) { return document.getElementById(id); }

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + '/' + path.replace(/^\//,''), opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.message || d.detail || '请求失败');
  return d;
}

async function doLogin() {
  const username = $('username').value.trim();
  const password = $('password').value;
  
  if (!username) {
    $('errorMsg').textContent = '请输入用户名';
    $('username').focus();
    return;
  }
  
  if (!password) {
    $('errorMsg').textContent = '请输入密码';
    $('password').focus();
    return;
  }
  
  $('loginBtn').textContent = '登录中...';
  $('loginBtn').disabled = true;
  
  try {
    const d = await api('POST', 'accounts/auth/login/', { username, password });
    localStorage.setItem('token', d.access);
    localStorage.setItem('user', JSON.stringify(d.user));
    
    const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
    sessionStorage.removeItem('redirectAfterLogin');
    location.href = redirectUrl;
  } catch(e) {
    $('errorMsg').textContent = e.message;
  } finally {
    $('loginBtn').textContent = '登录';
    $('loginBtn').disabled = false;
  }
}

function showForgotPassword() {
  alert('忘记密码功能即将上线，请联系管理员重置密码');
}

// 检查是否已登录
const token = localStorage.getItem('token');
if (token) {
  location.href = 'index.html';
}
</script>
</body>
</html>
