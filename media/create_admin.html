<!DOCTYPE html>
<html>
<body>
<script>
async function main() {
  try {
    const r = await fetch('/api/v1/accounts/auth/register/', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:'admin', password:'admin123', name:'管理员', telephone:'13800000000'})
    });
    const d = await r.json();
    if (r.ok) {
      document.body.innerHTML = '<h2>✅ 管理员账号创建成功!</h2><p>用户名: admin</p><p>密码: admin123</p><p><a href="/media/admin.html">→ 点此进入管理后台</a></p>';

      // 再调用一个接口把 type 改成 2
      const token = d.access;
      const r2 = await fetch('/api/v1/accounts/auth/profile/', {
        method: 'PUT',
        headers: {'Content-Type':'application/json','Authorization':'Bearer '+token},
        body: JSON.stringify({type:2})
      });
      if (r2.ok) document.body.innerHTML += '<p style="color:green">✅ 已升级为管理员权限</p>';
      else document.body.innerHTML += '<p style="color:red">⚠️ 权限升级失败，请在Navicat手动把type改成2</p>';
    } else {
      // 可能已存在，尝试登录
      const r2 = await fetch('/api/v1/accounts/auth/login/', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username:'admin', password:'admin123'})
      });
      const d2 = await r2.json();
      if (r2.ok) {
        document.body.innerHTML = '<h2>✅ admin 账号已存在</h2><p>密码: admin123</p><p>请在 Navicat 中打开 tb_user 表，将 type 字段改成 2</p>';
        document.body.innerHTML += '<p><a href="/media/admin.html">→ 点此进入管理后台</a></p>';
      } else {
        document.body.innerHTML = '<h2>❌ 创建失败</h2><p>' + JSON.stringify(d) + '</p>';
      }
    }
  } catch(e) {
    document.body.innerHTML = '<h2>❌ 请求失败</h2><p>' + e.message + '</p>';
  }
}
main();
</script>
</body>
</html>
