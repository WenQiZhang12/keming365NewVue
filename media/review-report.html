<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科明365 - 批阅实验报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#f5f6fa;min-height:100vh}
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header .logo{font-size:20px;font-weight:700}
.container{max-width:1200px;margin:24px auto;padding:0 20px}
.breadcrumb{font-size:13px;color:#999;margin-bottom:16px}
.breadcrumb a{color:#1a237e;text-decoration:none}
.breadcrumb span{color:#333}
.page-title{font-size:18px;font-weight:700;color:#1a237e;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.page-title .info{font-size:13px;color:#999;font-weight:400}
.content{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:20px}
.card h3{font-size:15px;color:#333;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}
.pdf-frame{width:100%;height:600px;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.pdf-frame iframe{width:100%;height:100%;border:none}
.score-area{padding:12px 0}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.score-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.score-item label{font-size:11px;color:#999}
.score-item input{width:50px;height:30px;text-align:center;border:1px solid #ddd;border-radius:4px;font-size:13px;outline:0}
.score-item input:focus{border-color:#1a237e}
.total-row{display:flex;align-items:center;gap:16px;padding:12px 0;border-top:1px solid #f0f0f0;margin-top:12px}
.total-row label{font-size:14px;font-weight:600;color:#333}
.total-row input{width:80px;height:34px;text-align:center;border:2px solid #1a237e;border-radius:6px;font-size:16px;font-weight:700;color:#1a237e;outline:0}
.total-row input:focus{border-color:#e53935}
.btn-submit{padding:10px 32px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:14px;cursor:pointer;transition:.2s;margin-left:auto}
.btn-submit:hover{background:#283593}
.file-info{font-size:13px;color:#666;margin-bottom:12px;line-height:1.8}
.file-info strong{color:#333}
@media(max-width:768px){.content{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="logo">📝 批阅实验报告</div>
</div>
<div class="container">
  <div class="breadcrumb">
    <a href="index.html">首页</a> &gt; <a href="teacher-reports.html">教师实验报告</a> &gt; <span id="breadcrumbInfo">批阅报告</span>
  </div>
  <div class="page-title" id="pageTitle">加载中...</div>
  <div class="content" id="content">
    <div class="card">
      <h3>📄 实验报告</h3>
      <div class="file-info" id="fileInfo">加载报告文件...</div>
      <div class="pdf-frame" id="pdfFrame">
        <div style="text-align:center;padding:100px 20px;color:#999">加载中...</div>
      </div>
    </div>
    <div class="card">
      <h3>✏️ 批阅打分</h3>
      <div class="score-area">
        <div class="score-grid" id="scoreGrid"></div>
        <div class="total-row">
          <label>总分：</label>
          <input type="text" id="scoreSum" oninput="value=value.replace(/[^\d]/g,'')" maxlength="3" placeholder="100">
          <span style="font-size:13px;color:#999">分</span>
          <button class="btn-submit" onclick="submitScore()">提交评分</button>
        </div>
      </div>
      <div id="studentInfo" style="font-size:13px;color:#666;line-height:2;margin-top:16px;padding-top:12px;border-top:1px solid #f0f0f0"></div>
    </div>
  </div>
</div>
<script>
const API = '/api/v1';
let reportId = '';
let pdfPath = '';

function getToken() {
  var t = localStorage.getItem('token');
  if (t) return t;
  try { const s = JSON.parse(localStorage.getItem('admin_state')||'{}'); return s.token || ''; } catch(e) { return ''; }
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + '/' + path.replace(/^\//,''), opts);
  if (r.status === 401) { var hadUser = !!localStorage.getItem('user'); localStorage.removeItem('token'); localStorage.removeItem('user'); alert(hadUser ? '登录已过期，请重新登录' : '请先登录'); location.href = 'index.html'; return null; }
  let data;
  try { data = await r.json(); } catch(e) { data = {}; }
  return data;
}

function getUserId() {
  try { var s = JSON.parse(localStorage.getItem('admin_state')||'{}'); if (s.user && s.user.id) return s.user.id; } catch(e) {}
  var token = getToken();
  if (token) { try { var p = JSON.parse(atob(token.split('.')[1])); if (p.user_id) return p.user_id; } catch(e) {} }
  return 'admin001';
}

async function init() {
  const params = new URLSearchParams(location.search);
  reportId = params.get('id');
  const studentName = params.get('student') || '';
  const experimentName = params.get('experiment') || '';
  $('breadcrumbInfo').textContent = '批阅 - ' + studentName;

  if (!reportId) { $('pageTitle').textContent = '❌ 缺少报告 ID'; return; }

  const d = await api('GET', 'scores/teacher/report/' + reportId + '/');
  if (!d || d.flag !== 1) {
    $('pageTitle').textContent = '❌ 报告加载失败';
    return;
  }

  pdfPath = d.pdfPath;
  $('pageTitle').innerHTML = '🧑 ' + d.studentName + ' <span class="info">' + d.experimentName + ' — ' + d.curriculumName + '</span>';
  $('fileInfo').innerHTML = '<strong>报告文件：</strong>' + (pdfPath ? pdfPath.split('/').pop() || pdfPath : '无') + '<br><strong>当前成绩：</strong>' + (d.scoreSum || '未评分') + ' 分';

  // PDF 预览
  if (pdfPath) {
    const p = pdfPath.replace(/\\/g, '/');
    const url = '/media/' + p.substring(p.indexOf('media/') + 6);
    $('pdfFrame').innerHTML = '<iframe src="' + url + '"></iframe>';
  } else {
    $('pdfFrame').innerHTML = '<div style="text-align:center;padding:100px 20px;color:#999">暂无实验报告文件</div>';
  }

  // 学生信息
  $('studentInfo').innerHTML = '学生：' + d.studentName + '<br>实验：' + d.experimentName + '<br>课程：' + d.curriculumName;

  // 评分网格（15 项）
  let gridHtml = '';
  for (let i = 1; i <= 15; i++) {
    gridHtml += '<div class="score-item"><label>第' + i + '项</label><input id="score' + i + '" type="text" maxlength="3" oninput="value=value.replace(/[^\\d]/g,\'\');calcSum()"></div>';
  }
  $('scoreGrid').innerHTML = gridHtml;
}

function calcSum() {
  let total = 0;
  for (let i = 1; i <= 15; i++) {
    const v = parseInt($('score' + i).value) || 0;
    total += v;
  }
  if (total > 0) $('scoreSum').value = total;
}

async function submitScore() {
  const sum = $('scoreSum').value;
  if (!sum || parseInt(sum) <= 0) { alert('请输入总分'); return; }
  if (parseInt(sum) > 100) { alert('总分不能超过 100'); return; }
  if (!confirm('确认提交评分：' + sum + ' 分？')) return;

  const uid = getUserId();
  const d = await api('GET', 'scores/teacher/report/' + reportId + '/score/?scoreSum=' + sum + '&userId=' + uid);
  if (d && d.flag === 1) {
    alert('评分提交成功！');
  } else {
    alert('提交失败：' + (d ? d.msg : '网络错误'));
  }
}

function $(id) { return document.getElementById(id); }
init();
</script>
</body>
</html>
