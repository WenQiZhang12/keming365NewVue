<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>实验操作 - 科明365VR教学云平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f5f6fa;color:#333}
a{text-decoration:none;color:inherit}

/* Header */
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 40px;height:64px;display:flex;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer;width:200px;flex-shrink:0}
.header .logo span{color:#64b5f6}
.header .nav{display:grid;grid-template-columns:repeat(7,1fr);width:700px;font-size:14px;text-align:center;position:absolute;left:50%;transform:translateX(-50%)}
.header .nav a{padding:6px 0;border-bottom:2px solid transparent;transition:.2s}
.header .nav a:hover,.header .nav a.active{border-bottom-color:#64b5f6;color:#64b5f6}
.header .user{font-size:14px;display:flex;align-items:center;gap:12px;margin-left:auto}
.header .user .name{color:#64b5f6}
.header .user .btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer}
.header .user .btn-login{background:#64b5f6;color:#fff;border:none}
.header .user .btn-login:hover{background:#42a5f5}
.header .user .btn-reg{border:1px solid rgba(255,255,255,.6);color:#fff;background:transparent}
.header .user .btn-reg:hover{border-color:#fff}
.header .user .btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.7);padding:4px 12px;border-radius:14px;cursor:pointer;font-size:12px}
.header .user .btn-logout:hover{border-color:#ff5252;color:#ff5252}

/* 次导航 */
.sub-nav{background:#fff;border-bottom:1px solid #e8e8e8;padding:0 40px;display:flex;align-items:center;gap:24px;height:48px;position:sticky;top:64px;z-index:99}
.sub-nav a{font-size:14px;color:#666;padding:12px 0;border-bottom:2px solid transparent;transition:.2s}
.sub-nav a:hover,.sub-nav a.active{color:#1a237e;border-bottom-color:#1a237e}

.container{max-width:1200px;margin:0 auto;padding:20px}

/* 面包屑 */
.breadcrumb{font-size:13px;color:#999;margin-bottom:16px}
.breadcrumb a{color:#1a237e}
.breadcrumb a:hover{text-decoration:underline}

/* 页面标题 */
.page-header{text-align:center;padding:40px 20px 30px}
.page-header h1{font-size:28px;color:#1a237e;margin-bottom:8px}
.page-header p{font-size:14px;color:#999}

/* 新闻列表 */
.news-list{max-width:900px;margin:0 auto}
.news-item{display:flex;gap:20px;background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:transform .2s,box-shadow .2s}
.news-item:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.news-item .thumb{width:180px;height:120px;border-radius:8px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center;font-size:36px}
.news-item .thumb img{width:100%;height:100%;object-fit:cover}
.news-item .info{flex:1;display:flex;flex-direction:column;justify-content:space-between}
.news-item .info h3{font-size:16px;font-weight:600;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}
.news-item .info h3:hover{color:#1a237e}
.news-item .info .summary{font-size:13px;color:#999;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.6;margin-bottom:8px}
.news-item .info .meta{display:flex;gap:16px;font-size:12px;color:#bbb}
.news-item .info .meta span{display:flex;align-items:center;gap:4px}

@media(max-width:768px){
.news-item{flex-direction:column}
.news-item .thumb{width:100%;height:160px}
}

/* 搜索 */
.search-bar{max-width:500px;margin:-10px auto 30px;display:flex}
.search-bar input{flex:1;padding:10px 16px;border:1px solid #ddd;border-radius:8px 0 0 8px;font-size:14px;outline:none}
.search-bar input:focus{border-color:#1a237e}
.search-bar button{padding:10px 20px;background:#1a237e;color:#fff;border:none;border-radius:0 8px 8px 0;cursor:pointer;font-size:14px}

/* 分页 */
.pagination{display:flex;justify-content:center;gap:6px;margin:32px 0}
.pagination span{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:14px;cursor:pointer;background:#fff;border:1px solid #e8e8e8;transition:.2s;color:#555}
.pagination span:hover{border-color:#1a237e;color:#1a237e}
.pagination span.active{background:#1a237e;color:#fff;border-color:#1a237e}
.pagination span.disabled{opacity:.4;cursor:default}

/* 加载 */
.loading{text-align:center;padding:60px;color:#999;font-size:15px}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #e0e0e0;border-top-color:#1a237e;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:80px 20px;color:#999}
.empty .icon{font-size:56px;margin-bottom:12px}

/* 用户头像下拉菜单 */
.user-dropdown{position:relative;display:inline-block}
.avatar{width:36px;height:36px;border-radius:50%;background:#64b5f6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;user-select:none}
.avatar:hover{background:#42a5f5;transform:scale(1.05)}
.dropdown-menu{position:absolute;top:48px;right:0;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);min-width:160px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .2s;z-index:200}
.dropdown-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown-item{padding:10px 16px;font-size:13px;color:#333;cursor:pointer;white-space:nowrap;transition:.15s}
.dropdown-item:hover{background:#f5f6fa;color:#1a237e}
.dropdown-item.danger{color:#e53935}
.dropdown-item.danger:hover{background:#ffebee}
.dropdown-divider{height:1px;background:#e8e8e8;margin:4px 0}

/* Toast */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:8px;font-size:14px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:fadeIn .3s}
.toast.success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.toast.error{background:#ffebee;color:#c62828;border:1px solid #ffcdd2}
.toast.info{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Footer */
.footer{background:#1a237e;color:rgba(255,255,255,.7);text-align:center;padding:32px 20px;font-size:13px;margin-top:40px}
.container{max-width:1200px;margin:24px auto;padding:0 20px}
.breadcrumb{font-size:13px;color:#999;margin-bottom:16px}
.breadcrumb a{color:#1a237e;text-decoration:none}
.loading{text-align:center;padding:80px;color:#999}
.spinner{display:inline-block;width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:#1a237e;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo" onclick="location.href='index.html'">📘<span>科明365</span>VR教学云平台</div>
    <div class="nav">
      <a href="index.html">首页</a>
      <a href="courses.html">全部课程</a>
      <a href="news.html">新闻资讯</a>
      <a href="platform.html">平台简介</a>
      <a href="video.html">职教出海</a>
      <a href="about.html">关于我们</a>
    </div>
    <div class="user" id="headerUser">
      <a href="login.html" class="btn btn-login">登录</a>
      <a href="register.html" class="btn btn-reg">注册</a>
    </div>
  </div>

<div class="container">
  <div class="breadcrumb"><a href="index.html">首页</a> &gt; <a href="courses.html">全部课程</a> &gt; <span id="breadcrumbMid"></span> &gt; <span id="breadcrumbTitle">实验操作</span></div>
  <div id="mainContent"><div class="loading"><div class="spinner"></div>加载中...</div></div>
</div>

<div class="footer">
<p>© 2026 科明365VR教学云平台 版权所有</p>
</div>
<script>
const API = '/api/v1';
function $(id){return document.getElementById(id)}


let loginOverlay = null;
function showLogin() {
  if (!loginOverlay) {
    loginOverlay = document.createElement('div');
    loginOverlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;display:flex;align-items:center;justify-content:center';
    loginOverlay.innerHTML = '<div style="background:#fff;border-radius:12px;padding:32px;width:380px;position:relative"><span style="position:absolute;right:16px;top:12px;cursor:pointer;font-size:20px" onclick="closeLogin()">✕</span><h2 style="margin-bottom:20px">登录</h2><div style="margin-bottom:14px"><input id="loginUser" placeholder="用户名" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div><div style="margin-bottom:14px"><input id="loginPass" type="password" placeholder="密码" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div><button onclick="doLogin()" style="width:100%;padding:10px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer">登录</button><p id="loginErr" style="color:#e53935;font-size:13px;margin-top:8px;text-align:center"></p></div>';
    document.body.appendChild(loginOverlay);
  }
  loginOverlay.style.display = 'flex';
  setTimeout(() => $('loginUser')?.focus(), 100);
}
function closeLogin() { if (loginOverlay) loginOverlay.style.display = 'none'; }
function toast(msg, type='info') {
  var el = document.createElement('div');
  el.textContent = msg;
  el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:10px 24px;border-radius:8px;z-index:9999;font-size:14px;color:#fff;background:' + (type==='success'?'#43a047':type==='error'?'#e53935':'#1e88e5');
  document.body.appendChild(el);
  setTimeout(function(){ el.remove(); }, 2500);
}
async function doLogin() {
  var u = $('loginUser')?.value, p = $('loginPass')?.value;
  if (!u || !p) { $('loginErr').textContent = '请填写用户名和密码'; return; }
  try {
    var d = await api('POST', 'accounts/auth/login/', { username: u, password: p });
    localStorage.setItem('token', d.access);
    localStorage.setItem('user', JSON.stringify(d.user));
    closeLogin();
    updateUserUI();
    toast('登录成功', 'success');
  } catch(e) { $('loginErr').textContent = e.message; }
}
function requireLogin() {
  var token = getToken();
  var user = localStorage.getItem('user');
  if (token && user) return true;
  if (confirm('您尚未登录，是否前往登录？')) { showLogin(); }
  return false;
}

function updateUserUI() {
  const el = $('headerUser');
  const saved = localStorage.getItem('user');
  if (saved) {
    try {
      const user = JSON.parse(saved);
      const name = user.name||user.username||'用户';
      const initial = name.charAt(0).toUpperCase();
      el.innerHTML = `<div class="user-dropdown"><div class="avatar" onclick="toggleMenu()">${initial}</div><div class="dropdown-menu" id="userMenu"><div class="dropdown-item" onclick="location.href='profile.html'">👤 个人中心</div><div class="dropdown-item" onclick="window.open('http://58.56.66.164:7777/manage/','_blank')">⚙️ 管理后台</div><div class="dropdown-divider"></div><div class="dropdown-item danger" onclick="logout()">🚪 退出登录</div></div></div>`;
      const t = user.type;
      setTimeout(()=>{var items=document.querySelectorAll('.dropdown-item');if(items.length>1)items[1].style.display=(t===2)?'block':'none';},0);
      return;
    } catch(e) {}
  }
  el.innerHTML = '<a href="javascript:;" class="btn btn-login" onclick="showLogin()">登录</a><a href="javascript:;" class="btn btn-reg" onclick="showLogin()">注册</a>';
}
function toggleMenu(){var m=document.getElementById('userMenu');if(m)m.classList.toggle('show');}
document.addEventListener('click',function(e){var m=document.getElementById('userMenu');if(m&&!e.target.closest('.user-dropdown'))m.classList.remove('show');});
function logout() { localStorage.removeItem("token"); localStorage.removeItem("user"); location.href="index.html"; }

const IMG_BASE = 'https://www.keming365.com/images';
function getImageUrl(path) {
  if (!path) return '';
  if (path.startsWith('http')) return path;
  var decodedPath = path;
  try { decodedPath = decodeURIComponent(path); } catch(e) {}
  return IMG_BASE + (decodedPath.startsWith('/') ? '' : '/') + decodedPath;
}

function getToken() {
  // 优先使用 localStorage.token（用户登录），其次 admin_state.token（管理后台）
  var t = localStorage.getItem('token');
  if (t) return t;
  try { var s = JSON.parse(localStorage.getItem('admin_state')||'{}'); return s.token || ''; } catch(e) { return ''; }
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  const token = getToken();
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + '/' + path.replace(/^\//,''), opts);
  if (r.status === 204) return {};
  if (r.status === 401) { var hadUser = !!localStorage.getItem('user'); localStorage.removeItem('token'); localStorage.removeItem('user'); alert(hadUser ? '登录已过期，请重新登录' : '请先登录'); location.href='index.html'; return null; }
  const data = await r.json();
  if (!r.ok) throw new Error(data.message||data.detail||'请求失败');
  return data;
}

function getParam(name){return new URLSearchParams(window.location.search).get(name)||'';}
var expData=null;
async function loadExperiment(){
  var id=getParam('id');
  var from=getParam('from');
  var fromName=getParam('fromName')||'';
  if(!id){document.getElementById('app').innerHTML='<div class="loading" style="padding:80px"><div style="font-size:48px;margin-bottom:12px">😵</div><p>缺少实验ID</p></div>';return;}
  try{
    expData=await api('GET','courses/experiments/'+id+'/');
    if (!expData) return;  // 401 已被 api() 处理
    document.title=expData.title+' - 科明365VR教学云平台';
    document.getElementById('breadcrumbTitle').textContent=expData.title;
    // 面包屑中间导航：返回上一层
    var midEl=document.getElementById('breadcrumbMid');
    if(from==='curriculum'&&fromName){
      midEl.innerHTML='<a href="javascript:history.back()">'+fromName+'</a> &gt;';
    }else if(from==='classify'&&fromName){
      midEl.innerHTML='<a href="courses.html?classifyId='+getParam('classifyId')+'">'+fromName+'</a> &gt;';
    }else if(from==='courses'&&fromName){
      midEl.innerHTML='<a href="courses.html">'+fromName+'</a> &gt;';
    }else{
      // 默认返回全部课程
      midEl.innerHTML='<a href="courses.html">全部课程</a> &gt;';
    }
    // 渲染实验页面
    renderExperiment(expData);
  }catch(e){
    document.getElementById('app').innerHTML='<div class="loading" style="padding:80px"><div style="font-size:48px;margin-bottom:12px">😵</div><p>加载失败：'+e.message+'</p></div>';
  }
}
async function startExperimentV2(id) {
  if (!requireLogin()) return;
  var btn = document.getElementById('expBtn');
  if (btn) { btn.textContent = '进入中...'; btn.style.opacity = '0.6'; }
  try {
    var res = await api('POST', 'courses/experiments/' + id + '/yqpath/');
    if (!res) return;  // 401 已被 api() 处理
    if (res.code !== 0) {
      alert(res.message || '进入实验失败');
      if (btn) { btn.textContent = '▶ 进入实验'; btn.style.opacity = '1'; }
      return;
    }
    var yqUrl = res.details.resultUrl;
    console.log('[DEBUG] 原始 resultUrl:', yqUrl);
    // 若 resultUrl 包含云雀内网 IP，则去除，统一使用公网域名
    var internalHosts = ['http://58.56.66.170:8181', 'https://58.56.66.170:8181', 'http://58.56.66.170', 'https://58.56.66.170'];
    for (var i = 0; i < internalHosts.length; i++) {
      if (yqUrl.indexOf(internalHosts[i]) === 0) {
        yqUrl = yqUrl.substring(internalHosts[i].length);
        console.log('[DEBUG] 剥离IP后:', yqUrl);
        break;
      }
    }
    yqUrl = 'https://yq.keming365.com' + yqUrl;
    console.log('[DEBUG] 最终URL:', yqUrl);
    var appKey = res.details.appKey || '';
    var u = navigator.userAgent;
    var isiOS = !!u.match(/\(i[^;]+;( U;)? CPU.+Mac OS X/);
    if (isiOS) {
      alert('您将要离开本站前往其他网站，确认请点击下面的链接：\n' + yqUrl);
    } else {
      var sUserAgent = navigator.userAgent.toLowerCase();
      if (sUserAgent.indexOf('mac') !== -1) {
        alert('您将要离开本站前往其他网站，确认请点击下面的链接：\n' + yqUrl);
      } else {
        window.open(yqUrl + '&appKey=' + appKey + '&timestamp=' + res.details.timestamp + '&signature=' + res.details.token, 'target', '');
      }
    }
  } catch (e) {
    alert('进入实验失败：' + e.message);
  }
  if (btn) { btn.textContent = '▶ 进入实验'; btn.style.opacity = '1'; }
}

function renderExperiment(data) {
  var app = document.getElementById('app');
  var appliId = data.appliId || data.appli_id || '';
  var imgUrl = getImageUrl(data.image);
  app.innerHTML =
    '<div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:20px">' +
      '<div style="display:flex;gap:20px;align-items:flex-start">' +
        '<div style="width:220px;height:155px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0">' +
          (imgUrl ? '<img src="' + imgUrl + '" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display=\'none\'">' : '🔬') +
        '</div>' +
        '<div style="flex:1">' +
          '<h2 style="font-size:22px;color:#1a237e;margin-bottom:16px;font-weight:700">' + (data.title || '') + '</h2>' +
          '<button id="expBtn" onclick="startExperimentV2(\'' + (data.id || '') + '\')" style="display:inline-block;padding:12px 32px;background:#1a237e;color:#fff;border-radius:8px;font-size:15px;text-decoration:none;border:none;cursor:pointer;margin-top:8px;box-shadow:0 2px 8px rgba(26,35,126,.3)">▶ 进入实验</button>' +
        '</div>' +
      '</div>' +
    '</div>' +
    // Tabs
    '<div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.06)">' +
      '<div style="display:flex;gap:0;border-bottom:2px solid #e8e8e8;margin-bottom:20px">' +
        '<div class="tab-btn active" onclick="switchExpTab(\'analysis\')" id="tabAnalysis" style="padding:12px 24px;font-size:15px;cursor:pointer;border-bottom:2px solid #1a237e;color:#1a237e;font-weight:600;margin-bottom:-2px">📊 数据分析</div>' +
        '<div class="tab-btn" onclick="switchExpTab(\'overview\')" id="tabOverview" style="padding:12px 24px;font-size:15px;cursor:pointer;color:#666;margin-bottom:-2px">📝 内容概述</div>' +
      '</div>' +
      '<div id="panelAnalysis" style="display:block">' +
        '<div style="display:flex;gap:16px;flex-wrap:wrap">' +
          '<div style="flex:1;min-width:280px;padding:12px 16px;background:linear-gradient(135deg,#f3e5f5,#ede7f6);border-radius:10px;text-align:center"><div style="font-size:12px;color:#666">访问总量</div><div id="statTotalVisits" style="font-size:28px;font-weight:700;color:#1a237e;margin-top:4px">-</div></div>' +
          '<div style="flex:1;min-width:280px;padding:12px 16px;background:linear-gradient(135deg,#e8f5e9,#f1f8e9);border-radius:10px;text-align:center"><div style="font-size:12px;color:#666">练习总次数</div><div id="statTotalPractice" style="font-size:28px;font-weight:700;color:#2e7d32;margin-top:4px">-</div></div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px">' +
          '<div><div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">📈 访问总量趋势</div><canvas id="chartCumVisits" height="200" style="width:100%;border-radius:8px;border:1px solid #e0e0e0"></canvas></div>' +
          '<div><div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">📈 练习总次数趋势</div><canvas id="chartCumPractice" height="200" style="width:100%;border-radius:8px;border:1px solid #e0e0e0"></canvas></div>' +
          '<div><div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">📊 新增访问量</div><canvas id="chartDailyVisits" height="200" style="width:100%;border-radius:8px;border:1px solid #e0e0e0"></canvas></div>' +
          '<div><div style="font-size:14px;font-weight:600;color:#333;margin-bottom:8px">📊 新增练习数</div><canvas id="chartDailyPractice" height="200" style="width:100%;border-radius:8px;border:1px solid #e0e0e0"></canvas></div>' +

  // 先记录访问，然后加载统计数据
  try {

function switchExpTab(tab) {
  var ta = document.getElementById('tabAnalysis'), to = document.getElementById('tabOverview');
  var pa = document.getElementById('panelAnalysis'), po = document.getElementById('panelOverview');
  if (tab === 'analysis') {
    ta.style.borderBottom='2px solid #1a237e'; ta.style.color='#1a237e'; ta.style.fontWeight='600';
    to.style.borderBottom='2px solid transparent'; to.style.color='#666'; to.style.fontWeight='400';
    pa.style.display='block'; po.style.display='none';
  } else {
    to.style.borderBottom='2px solid #1a237e'; to.style.color='#1a237e'; to.style.fontWeight='600';
    ta.style.borderBottom='2px solid transparent'; ta.style.color='#666'; ta.style.fontWeight='400';
    pa.style.display='none'; po.style.display='block';
  }
}

async function loadStats(expId) {
  try {
    var stats = await api('GET', 'courses/experiments/' + expId + '/stats/');
    if (!stats) return;
    // 汇总卡片
    var tv = document.getElementById('statTotalVisits');
    var tp = document.getElementById('statTotalPractice');
    if (tv) tv.textContent = stats.totalVisits || 0;
    if (tp) tp.textContent = stats.totalPractice || 0;
    // 绘制折线图
    drawLineChart('chartCumVisits', stats.cumulativeVisits || [], '#e53935', '访问总量');
    drawLineChart('chartCumPractice', stats.cumulativePractice || [], '#7cb342', '练习总次数');
    drawLineChart('chartDailyVisits', stats.dailyVisits || [], '#e53935', '新增访问量');
    drawLineChart('chartDailyPractice', stats.dailyPractice || [], '#7cb342', '新增练习数');
  } catch(e) {
    console.log('统计数据加载失败:', e);
  }
}

function drawLineChart(canvasId, dataArr, color, label) {
  var canvas = document.getElementById(canvasId);
  if (!canvas || !dataArr.length) return;
  var ctx = canvas.getContext('2d');
  var dpr = window.devicePixelRatio || 1;
  var rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  var W = rect.width, H = rect.height;
  var pad = {top:36, right:20, bottom:36, left:50};
  var cW = W - pad.left - pad.right, cH = H - pad.top - pad.bottom;
  var values = dataArr.map(function(d){return d.count;});
  var dates = dataArr.map(function(d){return d.date ? d.date.substring(5) : '';});
  
  // 计算数据范围
  var dataMin = Math.min.apply(null, values);
  var dataMax = Math.max.apply(null, values);
  
  // 如果所有值相同，扩展范围
  if (dataMin === dataMax) { 
    dataMin = Math.max(0, dataMin - 2);
    dataMax = dataMax + 2; 
  }
  
  // 确保数据范围至少为4，以便生成至少5个不同的整数刻度
  var dataRange = dataMax - dataMin;
  if (dataRange < 4) {
    var center = (dataMin + dataMax) / 2;
    dataMin = Math.floor(center - 2);
    dataMax = Math.ceil(center + 2);
    if (dataMin < 0) { dataMin = 0; dataMax = Math.max(4, dataMax); }
  }
  
  // 添加边距
  var range = dataMax - dataMin;
  var chartMin = Math.max(0, dataMin - range * 0.1);
  var chartMax = dataMax + range * 0.15;
  
  // 智能刻度生成 - 确保步长为整数且至少产生5个不同刻度
  var tickStep = Math.ceil((chartMax - chartMin) / 4);
  if (tickStep <= 0) tickStep = 1;
  
  // 调整刻度范围
  var axisMin = Math.floor(chartMin / tickStep) * tickStep;
  var axisMax = Math.ceil(chartMax / tickStep) * tickStep;
  if (axisMin < 0) axisMin = 0;
  // 确保 axisMax > axisMin 且至少有5个刻度
  if (axisMax - axisMin < 4 * tickStep) axisMax = axisMin + 4 * tickStep;
  // 确保 axisRange 是 4 的倍数，使中间刻度也是整数
  var axisRange = axisMax - axisMin;
  if (axisRange % 4 !== 0) {
    axisMax = axisMin + Math.ceil(axisRange / 4) * 4;
    axisRange = axisMax - axisMin;
  }
  
  // 背景
  ctx.fillStyle = '#fafafe';
  ctx.fillRect(0, 0, W, H);
  
  // 网格线和刻度 - 使用精确的数值计算
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = 0.5;
  ctx.fillStyle = '#999'; 
  ctx.font = '11px sans-serif'; 
  ctx.textAlign = 'right';
  
  // 生成刻度值
  var ticks = [];
  for (var g = 0; g <= 4; g++) {
    var tickValue = axisMin + axisRange * g / 4;
    ticks.push(tickValue);
  }
  
  // 绘制刻度和网格
  for (var g = 0; g <= 4; g++) {
    var tickValue = ticks[g];
    var gy = pad.top + cH - (cH * (tickValue - axisMin) / axisRange);
    ctx.beginPath(); 
    ctx.moveTo(pad.left, gy); 
    ctx.lineTo(W - pad.right, gy); 
    ctx.stroke();
    
    // 始终显示刻度值
    ctx.fillText(tickValue, pad.left - 6, gy + 4);
  }
  
  // 渐变填充
  var grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + cH);
  grad.addColorStop(0, color + '30');
  grad.addColorStop(1, color + '05');
  ctx.beginPath();
  for (var i = 0; i < values.length; i++) {
    var x = pad.left + (cW * i / (values.length - 1 || 1));
    var y = pad.top + cH - (cH * (values[i] - axisMin) / axisRange);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineTo(pad.left + cW, pad.top + cH);
  ctx.lineTo(pad.left, pad.top + cH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
  
  // 折线
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  for (var i = 0; i < values.length; i++) {
    var x = pad.left + (cW * i / (values.length - 1 || 1));
    var y = pad.top + cH - (cH * (values[i] - axisMin) / axisRange);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  
  // 数据点 + 数值
  for (var i = 0; i < values.length; i++) {
    var x = pad.left + (cW * i / (values.length - 1 || 1));
    var y = pad.top + cH - (cH * (values[i] - axisMin) / axisRange);
    ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(x, y, 2, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
    ctx.fillStyle = '#333'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(values[i], x, y - 10);
  }
  
  // X轴日期
  ctx.fillStyle = '#999'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  for (var i = 0; i < dates.length; i++) {
    var x = pad.left + (cW * i / (dates.length - 1 || 1));
    ctx.fillText(dates[i], x, H - 8);
  }
}
