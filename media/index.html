<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科明365VR教学云平台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#f5f6fa;color:#333}
a{text-decoration:none;color:inherit}

/* Header */
.header{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.header .logo{font-size:20px;font-weight:700;display:flex;align-items:center;gap:10px}
.header .logo span{color:#64b5f6}
.header .nav{display:flex;gap:24px;font-size:14px}
.header .nav a{padding:6px 0;border-bottom:2px solid transparent;transition:.2s}
.header .nav a:hover,.header .nav a.active{border-bottom-color:#64b5f6;color:#64b5f6}
.header .user{font-size:14px;display:flex;align-items:center;gap:12px}
.header .user .btn{padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer}
.header .user .btn-login{background:#64b5f6;color:#fff;border:none}
.header .user .btn-login:hover{background:#42a5f5}
.header .user .btn-reg{border:1px solid rgba(255,255,255,.6);color:#fff;background:transparent}
.header .user .btn-reg:hover{border-color:#fff}

/* Banner */
.banner{position:relative;height:400px;overflow:hidden;background:linear-gradient(135deg,#1a237e,#3949ab)}
.banner .slide{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .8s;text-align:center;color:#fff}
.banner .slide.active{opacity:1}
.banner .slide h1{font-size:42px;margin-bottom:16px}
.banner .slide p{font-size:18px;opacity:.8;max-width:600px}
.banner .dots{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px}
.banner .dots span{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer}
.banner .dots span.active{background:#fff;width:28px;border-radius:5px}

/* 搜索条 */
.search-bar{display:flex;justify-content:center;margin:0 auto 24px;position:relative;max-width:640px}
.search-bar input{flex:1;padding:14px 20px;border:2px solid transparent;border-radius:30px 0 0 30px;font-size:15px;outline:none;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.search-bar input:focus{border-color:#1a237e}
.search-bar button{padding:14px 28px;background:#1a237e;color:#fff;border:none;border-radius:0 30px 30px 0;font-size:15px;cursor:pointer}
.search-bar button:hover{background:#283593}

/* 内容区 */
.container{max-width:1200px;margin:0 auto;padding:0 20px}

/* 分类实验展示区 */
.classify-section{margin-bottom:28px}
.classify-header{display:flex;align-items:center;justify-content:space-between;height:36px;margin-bottom:12px}
.classify-header-left{display:flex;align-items:center;gap:10px}
.classify-icon{font-size:22px;line-height:1}
.classify-name{font-size:20px;font-weight:bold;color:#111}
.classify-more{font-size:13px;color:#1a237e;text-decoration:none;white-space:nowrap;transition:.2s}
.classify-more:hover{color:#283593;text-decoration:underline}
.experiment-scroll{display:flex;gap:20px;overflow-x:auto;padding-bottom:8px;height:220px}
.experiment-scroll::-webkit-scrollbar{height:6px}
.experiment-scroll::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.experiment-card{flex:0 0 200px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);cursor:pointer;transition:transform .2s,box-shadow .2s}
.experiment-card:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,.12)}
.experiment-thumb{width:100%;height:130px;overflow:hidden;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center}
.experiment-thumb img{width:100%;height:100%;object-fit:cover}
.experiment-title{font-size:14px;color:#111;padding:8px 10px 2px;margin:0;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;display:block;cursor:pointer}
.experiment-publisher{font-size:12px;color:#999;padding:0 10px 8px;margin:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.classify-empty{color:#ccc;font-size:13px;padding:20px 0;text-align:center}

/* 标题区 */
.section-title{display:flex;justify-content:space-between;align-items:center;margin:24px 0 16px}
.section-title h2{font-size:20px;color:#1a237e}
.section-title a{font-size:13px;color:#999}

/* 卡片网格 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-bottom:40px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.card .thumb{height:150px;background:linear-gradient(135deg,#e3f2fd,#bbdefb);display:flex;align-items:center;justify-content:center;font-size:42px;position:relative}
.card .thumb .tag{position:absolute;top:10px;left:10px;background:rgba(26,35,126,.8);color:#fff;font-size:11px;padding:3px 10px;border-radius:4px}
.card .body{padding:14px 16px 16px}
.card .body h3{font-size:15px;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4;min-height:42px}
.card .body .meta{font-size:12px;color:#999;display:flex;gap:12px;margin-top:4px}
.card .body .price{font-size:18px;color:#e53935;font-weight:700;margin-top:6px}
.card .body .price .free{color:#43a047}
/* 新闻卡片特殊样式 */
.news-card .body .summary{font-size:13px;color:#999;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:4px;line-height:1.5}

/* 分页 */
.pages{display:flex;justify-content:center;gap:8px;margin:24px 0}
.pages button{padding:7px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;font-size:13px}
.pages button:hover{color:#1a237e;border-color:#1a237e}
.pages button.active{background:#1a237e;color:#fff;border-color:#1a237e}

/* 底部 */
.footer{background:#1a237e;color:rgba(255,255,255,.7);text-align:center;padding:24px;font-size:13px;margin-top:40px}

/* 隐藏页面（保留兼容） */
.page{display:none}
.page.active{display:block}

/* 用户头像下拉菜单 */
.user-dropdown{position:relative;display:inline-block}
.avatar{width:36px;height:36px;border-radius:50%;background:#64b5f6;color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;user-select:none}
.avatar:hover{background:#42a5f5;transform:scale(1.05)}
.dropdown-menu{position:absolute;top:48px;right:0;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);min-width:160px;opacity:0;visibility:hidden;transform:translateY(-6px);transition:all .2s;z-index:200}
.dropdown-menu.show{opacity:1;visibility:visible;transform:translateY(0)}
.dropdown-item{padding:10px 16px;font-size:13px;color:#333;cursor:pointer;white-space:nowrap;transition:.15s}
.dropdown-item:hover{background:#f5f6fa;color:#1a237e}
.dropdown-item.danger{color:#e53935}
.dropdown-item.danger:hover{background:#ffebee}
.dropdown-divider{height:1px;background:#e8e8e8;margin:4px 0}

/* 响应式 */
@media(max-width:768px){
  .header{padding:0 16px}
  .header .nav{display:none}
  .banner{height:240px}
  .banner .slide h1{font-size:24px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .experiment-card{flex:0 0 160px}
  .experiment-scroll{height:200px}
  .classify-name{font-size:16px}
}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="header">
    <div class="logo" onclick="location.href='index.html'">🎓 <span>科明365</span>VR教学云平台</div>
    <div class="nav">
      <a href="index.html" class="active">首页</a>
      <a href="courses.html">全部课程</a>
      <a href="news.html">新闻资讯</a>
      <a href="about.html">关于我们</a>
      <a href="profile.html">个人中心</a>
      
    </div>
    <div class="user" id="headerUser">
      <button class="btn btn-reg" onclick="showLogin=true;render()">注册</button>
      <button class="btn btn-login" onclick="showLoginDialog()">登录</button>
    </div>
  </div>

  <!-- 首页 -->
  <div id="page-home" class="page active">
    <div class="banner" id="banner">
      <div class="slide active"><div><h1>VR虚拟仿真教学平台</h1><p>覆盖12大学科，3000+教学资源，让学习更直观</p></div></div>
      <div class="slide"><div><h1>在线实验 随时随地</h1><p>支持PC端、移动端，轻松开展虚拟仿真实验</p></div></div>
      <div class="slide"><div><h1>名校名师 精品课程</h1><p>汇聚全国高校优质VR教学资源</p></div></div>
      <div class="dots" id="bannerDots"><span class="active"></span><span></span><span></span></div>
    </div>

    <div class="container">
      <div class="search-bar"><input placeholder="搜索..." id="searchInput" onkeydown="if(event.key==='Enter')doSearch()" autocomplete="off"><button onclick="doSearch()">🔍 搜索</button></div>

      <div id="classifySections"></div>

      <div class="section-title"><h2>📢 新闻动态</h2><a href="news.html">更多 →</a></div>
      <div class="grid" id="newsGrid"></div>
    </div>
  </div>

  <!-- 课程列表页（已迁移到 courses.html） -->

  <!-- 课程详情页 -->
  <!-- 新闻列表页 -->
  <div id="page-news" class="page">
    <div class="container" style="padding-top:30px">
      <div class="section-title"><h2>📰 新闻资讯</h2></div>
      <div class="grid" id="allNewsGrid"></div>
      <div class="pages" id="newsPages"></div>
    </div>
  </div>

  <!-- 登录弹窗 -->
  <div class="overlay" id="loginOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:999;align-items:center;justify-content:center">
    <div style="background:#fff;border-radius:12px;padding:32px;width:380px;margin:auto;position:relative">
      <span style="position:absolute;right:16px;top:12px;cursor:pointer;font-size:20px" onclick="loginOverlay.style.display='none'">✕</span>
      <h2 style="margin-bottom:20px">🔐 登录</h2>
      <div style="margin-bottom:14px"><input id="loginUser" placeholder="用户名" onkeydown="if(event.key==='Enter')$('loginPass').focus()" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>
      <div style="margin-bottom:14px"><input id="loginPass" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;outline:none"></div>
      <button id="loginBtn" onclick="doLogin()" style="width:100%;padding:10px;background:#1a237e;color:#fff;border:none;border-radius:6px;font-size:15px;cursor:pointer">登录</button>
      <p id="loginErr" style="color:#e53935;font-size:13px;margin-top:8px;text-align:center"></p>
      <p style="text-align:center;margin-top:12px;font-size:13px;color:#666">没有账号？<a href="#" onclick="switchAuthMode()" style="color:#1a237e">立即注册</a></p>
    </div>
  </div>
</div>

<script>
const API = '/api/v1';
let state = { token: localStorage.getItem('token')||'', user: null };
let bannerTimer = null, bannerIdx = 0;

// ====== API ======
async function api(method, path, body, auth=false) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (auth && state.token) opts.headers['Authorization'] = 'Bearer ' + state.token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + '/' + path.replace(/^\//,''), opts);
  const d = await r.json();
  if (!r.ok) throw new Error(d.message || d.detail || '请求失败');
  return d;
}

// ====== 页面切换（已废弃，保留空函数避免报错）=====
function showPage(name) {}

const IMG_BASE = 'https://www.keming365.com/images';
function getImageUrl(path) {
  if (!path) return '';
  if (path.startsWith('http')) return path;
  return IMG_BASE + (path.startsWith('/') ? '' : '/') + path;
}

// ====== 分类实验展示 ======
const CLASSIFY_ICONS = {
  '机械工程':'⚙️','工程训练':'🔧','力学':'📐','土木工程':'🏗️',
  '大学物理':'🔭','能源动力':'🔥','水利工程':'💧','生物工程':'🧬','文化艺术':'🎨'
};
function getClassifyIcon(name) { return CLASSIFY_ICONS[name] || '📚'; }

async function loadClassifySections() {
  var container = document.getElementById('classifySections');
  try {
    var d = await api('GET', 'home/classify/');
    var classifies = d.results || d || [];
    if (classifies.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:40px;color:#999">暂无分类数据</div>';
      return;
    }
    // 并行请求每个分类的实验
    var promises = classifies.map(function(c) {
      return api('GET', 'courses/experiments/?classifyId=' + c.id + '&page_size=5')
        .then(function(res) { return { classify: c, experiments: res.results || [] }; })
        .catch(function(err) { console.error('加载分类实验失败:', c.className, err); return { classify: c, experiments: [] }; });
    });
    var allData = await Promise.all(promises);
    container.innerHTML = allData.map(renderClassifySection).join('');
  } catch(e) {
    console.error('加载分类失败:', e);
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#e53935">加载失败，请刷新页面</div>';
  }
}

function renderClassifySection(data) {
  var c = data.classify;
  var exps = data.experiments;
  var name = c.className || '未命名分类';
  var icon = getClassifyIcon(name);
  var moreLink = '<a class="classify-more" href="courses.html?classifyId='+c.id+'">更多 →</a>';
  if (exps.length === 0) {
    return '<div class="classify-section"><div class="classify-header"><div class="classify-header-left"><span class="classify-icon">'+icon+'</span><span class="classify-name">'+escapeHtml(name)+'</span></div>'+moreLink+'</div><div class="classify-empty">暂无实验</div></div>';
  }
  var cards = exps.map(renderExperimentCard).join('');
  return '<div class="classify-section"><div class="classify-header"><div class="classify-header-left"><span class="classify-icon">'+icon+'</span><span class="classify-name">'+escapeHtml(name)+'</span></div>'+moreLink+'</div><div class="experiment-scroll">'+cards+'</div></div>';
}

function renderExperimentCard(exp) {
  var imgUrl = getImageUrl(exp.image);
  var title = escapeHtml(exp.title || '未命名实验');
  var publisher = escapeHtml(exp.publisher || '');
  var imgHtml = imgUrl
    ? '<img src="'+imgUrl+'" loading="lazy" onerror="this.style.display=\'none\';this.parentNode.innerHTML=\'<span style=font-size:36px>🔬</span>\'">'
    : '<span style="font-size:36px">🔬</span>';
  return '<div class="experiment-card" onclick="enterExperiment(\''+exp.id+'\')"><div class="experiment-thumb">'+imgHtml+'</div><p class="experiment-title" title="'+title+'">'+title+'</p><p class="experiment-publisher">'+publisher+'</p></div>';
}

function enterExperiment(id) {
  window.open('experiment.html?id=' + encodeURIComponent(id), '_blank');
}

// ====== 新闻 ======
async function loadNews() {
  try {
    const d = await api('GET', 'news/?page=1&page_size=6');
    renderNews(d.results||[], d.count||0);
  } catch(e) { console.error(e); }
}
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>"']/g, function(m) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];
  });
}

function renderNews(news, total) {
  var html = news.map(function(n) {
    var summary = (n.content||'').replace(/<[^>]+>/g,'').slice(0,60);
    var dateStr = n.createTime ? n.createTime.slice(0,10) : (n.time ? n.time.slice(0,10) : '-');
    return '<div class="card news-card" onclick="location.href=\'news-detail.html?id='+n.id+'\'">'+
      '<div class="thumb">📰<span class="tag">资讯</span></div>'+
      '<div class="body">'+
        '<h3>'+escapeHtml(n.title||'')+'</h3>'+
        '<div class="summary">'+escapeHtml(summary||'暂无内容')+'</div>'+
        '<div class="meta"><span>📅 '+dateStr+'</span><span>👁️ '+(n.browsetimes||0)+'</span></div>'+
      '</div>'+
    '</div>';
  }).join('') || '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#999">暂无新闻</div>';
  document.getElementById('newsGrid').innerHTML = html;
  document.getElementById('allNewsGrid').innerHTML = html;
  document.getElementById('newsPages').innerHTML = '<span>共 '+(total||0)+' 条</span>';
}

// ====== 搜索 ======
function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  location.href = 'courses.html?search=' + encodeURIComponent(q);
}

// ====== 登录 ======
function showLoginDialog() {
  const el = document.getElementById('loginOverlay');
  el.style.display = 'flex';
  document.getElementById('loginUser')?.focus();
}
async function doLogin() {
  const username = document.getElementById('loginUser').value;
  const password = document.getElementById('loginPass').value;
  if (!username || !password) { document.getElementById('loginErr').textContent='请填完'; return; }
  try {
    const d = await api('POST', 'accounts/auth/login/', {username, password});
    state.token = d.access; state.user = d.user;
    localStorage.setItem('token', d.access);
    localStorage.setItem('user', JSON.stringify(d.user));
    document.getElementById('loginOverlay').style.display = 'none';
    state.user = d.user;
    state.token = d.access;
    updateHeaderUser();
    alert('登录成功！');
  } catch(e) {
    document.getElementById('loginErr').textContent = e.message;
  }
}
function logout() {
  state.token = ''; state.user = null;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  location.href = 'index.html';
}
function toggleMenu() {
  const m = document.getElementById('userMenu');
  if (m) m.classList.toggle('show');
}
document.addEventListener('click', function(e) {
  const m = document.getElementById('userMenu');
  if (m && !e.target.closest('.user-dropdown')) m.classList.remove('show');
});

// ====== Banner 轮播 ======
function startBanner() {
  const slides = document.querySelectorAll('.banner .slide');
  const dots = document.querySelectorAll('.banner .dots span');
  if (slides.length===0) return;
  
  // 添加点击事件
  dots.forEach((dot, idx) => {
    dot.onclick = function() {
      slides.forEach(s => s.classList.remove('active'));
      dots.forEach(d => d.classList.remove('active'));
      bannerIdx = idx;
      slides[bannerIdx].classList.add('active');
      dots[bannerIdx].classList.add('active');
    };
  });
  
  bannerTimer = setInterval(() => {
    // 鼠标悬停时暂停
    if (document.querySelector('.banner:hover')) return;
    slides.forEach(s => s.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    bannerIdx = (bannerIdx + 1) % slides.length;
    slides[bannerIdx].classList.add('active');
    dots[bannerIdx].classList.add('active');
  }, 4000);
}

// ====== 检查登录态 ======
function updateHeaderUser() {
  const el = document.getElementById('headerUser');
  if (!state.user) {
    el.innerHTML = '<button class="btn btn-reg" onclick="showLoginDialog()">注册</button><button class="btn btn-login" onclick="showLoginDialog()">登录</button>';
    return;
  }
  const name = state.user.name || state.user.username || '用户';
  const initial = name.charAt(0).toUpperCase();
  el.innerHTML = `
    <div class="user-dropdown">
      <div class="avatar" onclick="toggleMenu()">${initial}</div>
      <div class="dropdown-menu" id="userMenu">
        <div class="dropdown-item" onclick="location.href='profile.html'">👤 个人中心</div>
        <div class="dropdown-item" onclick="window.open('http://58.56.66.164:7777/manage/','_blank')">⚙️ 管理后台</div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item danger" onclick="logout()">🚪 退出登录</div>
      </div>
    </div>`;
  // 教师或管理员显示实验报告入口
  const t = state.user.type;
  // 管理员才显示管理后台下拉项
  setTimeout(() => {
    const items = document.querySelectorAll('.dropdown-item');
    if (items.length > 0) items[1].style.display = (t===2) ? 'block' : 'none';
  }, 0);
}

async function checkLogin() {
  // 先尝试从 localStorage 恢复 user
  const saved = localStorage.getItem('user');
  if (saved) { try { state.user = JSON.parse(saved); updateHeaderUser(); } catch(e){} }
  
  // 如果有 token，后台验证并刷新用户信息
  if (!state.token) return;
  try {
    const d = await api('GET', 'accounts/auth/profile/', null, true);
    state.user = d;
    localStorage.setItem('user', JSON.stringify(d));
    updateHeaderUser();
  } catch(e) {
    console.log('Token expired or invalid');
  }
}

// 替换掉原来的 logout 里手动设置 header 的方式
// (logout 本身已经调用了 localStorage.removeItem)

// ====== 初始化 ======
async function init() {
  await checkLogin();
  loadClassifySections();
  loadNews();
  document.getElementById('searchInput').value='';
  startBanner();
}
