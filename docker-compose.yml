# ============================================================================
# docker-compose.yml — 科明365 教学云平台 生产部署
# ============================================================================
# 用法：
#   docker-compose up -d                   # 启动所有服务
#   docker-compose logs -f                 # 查看日志
#   docker-compose down                    # 停止所有服务
# ============================================================================

version: "3.8"

services:

  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: keming365-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-new365}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 缓存 / Channels ----
  redis:
    image: redis:7-alpine
    container_name: keming365-redis
    restart: always
    command: redis-server
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---- Django 应用 (Gunicorn) ----
  backend:
    build: .
    container_name: keming365-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-deploy-key-2024}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-new365}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  # ---- Nginx 反向代理 ----
  nginx:
    image: nginx:1.25-alpine
    container_name: keming365-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
      - ./ssl:/etc/nginx/ssl:ro

volumes:
  mysql_data:
  redis_data:
  media_data:
  static_data:
